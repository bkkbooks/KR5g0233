body:
  text: 太上老君太素經太素皓皓命之曰道太素之時神徃營之道乃生之生之形之道乃命之道乃成之故天地成形道德成經道莫大於自然德莫大於長生道生一一生二二生三三生天地天地充滿滿則損損則反其本故天一無不覆地一無不載日月一無不照故知之一不知也不一之一無一之知夫道之可奇也賢者通之聖人行之不可不知也道大而無形隱而無名其在天地外者窈𡨋其在天地中者充盛故天地之間盡道焉非吾獨也道不欲也非吾異也又云生可冀也死可畏也草木根生去地而死魚鼈沉生去水而死人以形生去氣而死故聖人知氣之所在以爲身寶又云大道張天下之大效大書陳天下之大略大人以爲足人之所好吾之所患人之所執吾之所舍二者唯聖人能知其故又云大德受天下之大惡大人受天下之大辱能受天下之大惡故能食天下之尊禄能受天下之大辱故能爲天下之獨貴又云心之於人猶水居器中停之則平欹之則傾撓之則濁澄之則清治心其猶水乎壅之則止通之則行决之西則西東則東人心不可不杜塞如水不可不隄防也又云故易有太極太極謂太易太易者大曉易無有先之者謂皓皓白氣也乃有太初初者氣之始也有太始太始者形之始也有太素太素者質之始也故謂易易變爲一一變爲三三變爲五五變爲七七變爲九九者究也極後變爲一一者謂天也故輕清者即上爲天重濁者即下爲地中和氣者爲人故天地合精萬物化生太上老君太素經
